services:
  bambu-spoolman-sync:
    image: ghcr.io/piitaya/bambu-spoolman-sync:latest
    container_name: bambu-spoolman-sync
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      # config.json + filaments.json cache live here
      - ./data:/data
    environment:
      # Uncomment to override defaults
      # PORT: "4000"
      # HOST: "0.0.0.0"
      # DATA_DIR: "/data"
